<main class="profile-page">
  <section class="profile-card">
    <img [src]="profile.photo" [alt]="profile.name" class="profile-photo" />

    <h1>{{ profile.name }}</h1>
    <p class="slack"><span class="slack-label">Slack:</span> {{ profile.slackId }}</p>

    <ul class="links">
      @for (link of profile.links; track link.label) {
        <li>
          <a [href]="link.url" target="_blank" rel="noopener noreferrer">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>
  </section>
</main>
